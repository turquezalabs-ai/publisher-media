<!DOCTYPE html>
<html>
<head>
<title>PULSE Banner Editor</title>
<style>
  body { background: #1a1a2e; margin: 0; padding: 20px; display: flex; gap: 20px; }
  .sidebar { width: 300px; background: #16213e; padding: 20px; border-radius: 10px; color: white; font-family: Arial; }
  .sidebar label { display: block; margin: 10px 0 4px 0; font-size: 13px; color: #aaa; }
  .sidebar input { width: 100%; padding: 6px 10px; background: #1a1a3e; border: 1px solid #333; color: white; border-radius: 5px; font-size: 14px; }
  .sidebar h3 { margin-top: 20px; color: #3B82F6; }
  .preview { flex: 1; }
  img { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  button { margin-top: 20px; padding: 10px 20px; background: #3B82F6; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
  button:hover { background: #2563eb; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>PULSE Editor</h2>
  <p style="font-size:12px;color:#888">Edit numbers, click "Regenerate" to see changes.</p>

  <h3>2D Section</h3>
  <label>2D Title Y position</label>
  <input type="number" id="title2DY" value="322">
  
  <label>2D Circle center Y</label>
  <input type="number" id="circle2DY" value="434">

  <label>2D Pattern start Y</label>
  <input type="number" id="pattern2DY" value="537">

  <label>2D Pattern gap (line height)</label>
  <input type="number" id="pattern2DGap" value="50">

  <h3>3D Section</h3>
  <label>Divider Y</label>
  <input type="number" id="dividerY" value="695">

  <label>3D Title Y position</label>
  <input type="number" id="title3DY" value="746">

  <label>3D Circle center Y</label>
  <input type="number" id="circle3DY" value="857">

  <label>3D Pattern start Y</label>
  <input type="number" id="pattern3DY" value="948">

  <label>3D Pattern gap (line height)</label>
  <input type="number" id="pattern3DGap" value="50">

  <h3>Footer</h3>
  <label>Disclaimer Y</label>
  <input type="number" id="footer1Y" value="1186">

  <label>Disclaimer 2 Y</label>
  <input type="number" id="footer2Y" value="1214">

  <label>Website Y</label>
  <input type="number" id="footer3Y" value="1286">

  <button onclick="regenerate()">🔄 Regenerate SVG</button>
</div>

<div class="preview">
  <img id="banner" src="pulse-test.svg">
</div>

<script>
function regenerate() {
  const fs = require('fs');
  const { fetchAndProcessData } = require('./src/lib/banner/data-preprocessor');
  const { fetchPulseData } = require('./src/lib/banner/pulse-engine');
  const { buildPulseSVG } = require('./src/lib/banner/server-render');

  const pos = {
    title2DY: +document.getElementById('title2DY').value,
    circle2DY: +document.getElementById('circle2DY').value,
    pattern2DY: +document.getElementById('pattern2DY').value,
    pattern2DGap: +document.getElementById('pattern2DGap').value,
    dividerY: +document.getElementById('dividerY').value,
    title3DY: +document.getElementById('title3DY').value,
    circle3DY: +document.getElementById('circle3DY').value,
    pattern3DY: +document.getElementById('pattern3DY').value,
    pattern3DGap: +document.getElementById('pattern3DGap').value,
    footer1Y: +document.getElementById('footer1Y').value,
    footer2Y: +document.getElementById('footer2Y').value,
    footer3Y: +document.getElementById('footer3Y').value,
  };

  alert('Run: npx tsx pulse-editor.ts\n\nSee terminal for output.');
}
</script>

</body>
</html>
